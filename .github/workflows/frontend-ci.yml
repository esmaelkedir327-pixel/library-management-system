name: Frontend CI

on:
  push:
    paths:
      - 'frontend/**'
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install
        working-directory: frontend
        run: |
          npm ci
      - name: Test
        working-directory: frontend
        run: |
          npm test -- --watchAll=false
      - name: Build
        working-directory: frontend
        run: |
          npm run build
